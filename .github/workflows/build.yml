name: Build and Push to ACR
on:
  workflow_run:
    workflows:
      - Security Scans
    types:
      - completed

  workflow_dispatch:

env:

  REGISTRY_URL: ${{ secrets.ACR_LOGIN_SERVER }}
  REGISTRY_USERNAME: ${{ secrets.ACR_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.ACR_PASSWORD }}

jobs:

  build-and-push:
    name: Build Scan Push ${{ matrix.service }}

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - cartservice
          - productcatalogservice
          - currencyservice
          - paymentservice
          - shippingservice
          - emailservice
          - recommendationservice
          - adservice
          - checkoutservice
          - loadgenerator
          - shoppingassistantservice
          - redis-cart

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3

        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: |
            ${{ matrix.service }}:scan

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Tag Image
        run: |
          docker tag \
          ${{ matrix.service }}:scan \
          ${{ env.REGISTRY_URL }}/${{ matrix.service }}:latest

          docker tag \
          ${{ matrix.service }}:scan \
          ${{ env.REGISTRY_URL }}/${{ matrix.service }}:${{ github.sha }}

      - name: Push Latest Image
        run: |
          docker push \
          ${{ env.REGISTRY_URL }}/${{ matrix.service }}:latest

      - name: Push SHA Image
        run: |
          docker push \
          ${{ env.REGISTRY_URL }}/${{ matrix.service }}:${{ github.sha }}

      - name: Image Completed
        run: |
          echo "${{ matrix.service }} pushed successfully"