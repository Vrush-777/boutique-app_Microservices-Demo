name: Microservices CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # -----------------------------------------------
  # CI - Job 1: Discover all services with a Dockerfile
  # -----------------------------------------------
  detect-services:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.list.outputs.services }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: List all services
        id: list
        run: |
          SERVICES=$(find src/ -name Dockerfile \
            | sed 's|src/\([^/]*\)/.*|\1|' \
            | sort -u \
            | jq -R -s -c 'split("\n")[:-1]')
          echo "Discovered services: $SERVICES"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  # -----------------------------------------------
  # CI - Job 2: Build, scan and push to Docker Hub
  # -----------------------------------------------
  build-and-push:
    needs: detect-services

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}

    uses: ./.github/workflows/microservice-ci.yaml
    secrets: inherit

    with:
      service: ${{ matrix.service }}

  # -----------------------------------------------
  # CD - Job 3: Deploy all services to AKS via Helm
  # -----------------------------------------------
  deploy:
    needs: [detect-services, build-and-push]
    runs-on: ubuntu-latest
    env:
      NAMESPACE: boutique-app
      RELEASE_NAME: onlineboutique
      RESOURCE_GROUP: AZET-RG-Daas-Platform
      CLUSTER_NAME: ppowar-aks

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --admin \
            --overwrite-existing

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create or refresh Docker Hub pull secret
        run: |
          kubectl create secret docker-registry dockerhub-pull-secret \
            --namespace ${{ env.NAMESPACE }} \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.DOCKERHUB_USERNAME }} \
            --docker-password=${{ secrets.DOCKERHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Resolve field manager conflicts
        run: |
          kubectl get svc,deploy -n ${{ env.NAMESPACE }} -o yaml 2>/dev/null \
            | kubectl apply --server-side --force-conflicts \
                --field-manager=helm -f - 2>/dev/null || true

      - name: Deploy all services to AKS
        run: |
          SERVICES='${{ needs.detect-services.outputs.services }}'
          SET_FLAGS=""
          for svc in $(echo "$SERVICES" | jq -r '.[]'); do
            SET_FLAGS="$SET_FLAGS \
              --set images.${svc}.repository=${{ secrets.DOCKERHUB_USERNAME }}/microservices-demo-${svc} \
              --set images.${svc}.tag=sha-${{ github.sha }}"
          done

          helm upgrade --install ${{ env.RELEASE_NAME }} ./helm-chart \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values ./helm-chart/values.yaml \
            --values ./helm-chart/values-aks.yaml \
            $SET_FLAGS \
            --wait \
            --timeout 5m

      - name: Apply Ingress
        run: kubectl apply -f microservices-extra-kube-manifests/ingress-aks.yaml
