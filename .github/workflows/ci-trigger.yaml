name: Microservices CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "helm-chart/**"
      - "microservices-extra-kube-manifests/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  NAMESPACE: boutique-app
  RELEASE_NAME: onlineboutique
  RESOURCE_GROUP: AZET-RG-Daas-Platform
  CLUSTER_NAME: ppowar-aks

jobs:
  # -----------------------------------------------
  # Job 1 — Detect what changed and list services
  # -----------------------------------------------
  detect:
    runs-on: ubuntu-latest
    outputs:
      services:   ${{ steps.detect.outputs.services }}
      src_changed: ${{ steps.detect.outputs.src_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Detect changes and list services
        id: detect
        run: |
          SRC_CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep -c '^src/' || true)

          if [ "$SRC_CHANGED" -gt "0" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "src_changed=true" >> $GITHUB_OUTPUT
            SERVICES=$(find src/ -name Dockerfile \
              | sed 's|src/\([^/]*\)/.*|\1|' \
              | sort -u \
              | grep -v shoppingassistantservice \
              | jq -R -s -c 'split("\n")[:-1]')
          else
            echo "src_changed=false" >> $GITHUB_OUTPUT
            SERVICES="[]"
          fi

          echo "Discovered services: $SERVICES"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  # -----------------------------------------------
  # Job 2 — Build, scan and push all images (CI)
  # -----------------------------------------------
  build-and-push:
    needs: detect
    if: needs.detect.outputs.src_changed == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}

    env:
      REPO: ${{ secrets.DOCKERHUB_USERNAME }}/boutique-app
      SVC:  ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve build context
        id: ctx
        run: |
          if [ -f "./src/${{ matrix.service }}/Dockerfile" ]; then
            echo "context=./src/${{ matrix.service }}" >> $GITHUB_OUTPUT
            echo "dockerfile=./src/${{ matrix.service }}/Dockerfile" >> $GITHUB_OUTPUT
          else
            DOCKERFILE=$(find "./src/${{ matrix.service }}" -name Dockerfile | head -1)
            echo "context=$(dirname $DOCKERFILE)" >> $GITHUB_OUTPUT
            echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -f ${{ steps.ctx.outputs.dockerfile }} \
            -t ${{ env.REPO }}:${{ env.SVC }} \
            -t ${{ env.REPO }}:${{ env.SVC }}-${SHORT_SHA} \
            ${{ steps.ctx.outputs.context }}

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REPO }}:${{ env.SVC }}
          severity: HIGH,CRITICAL
          exit-code: 0
          vuln-type: os,library

      - name: Push image to Docker Hub
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker push ${{ env.REPO }}:${{ env.SVC }}
          docker push ${{ env.REPO }}:${{ env.SVC }}-${SHORT_SHA}

  # -----------------------------------------------
  # Job 3 — Deploy to AKS via Helm (CD)
  # -----------------------------------------------
  deploy:
    needs: [ detect, build-and-push ]
    if: |
      always() &&
      needs.detect.result == 'success' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --admin \
            --overwrite-existing

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create or refresh Docker Hub pull secret
        run: |
          kubectl create secret docker-registry dockerhub-pull-secret \
            --namespace ${{ env.NAMESPACE }} \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.DOCKERHUB_USERNAME }} \
            --docker-password=${{ secrets.DOCKERHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Fix Helm field-manager conflict on frontend Service
        run: |
          kubectl delete service frontend \
            --namespace ${{ env.NAMESPACE }} \
            --ignore-not-found

      - name: Deploy to AKS
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          SET_FLAGS=""
          if [ "${{ needs.detect.outputs.src_changed }}" = "true" ]; then
            SERVICES='${{ needs.detect.outputs.services }}'
            for svc in $(echo "$SERVICES" | jq -r '.[]'); do
              SET_FLAGS="$SET_FLAGS \
                --set images.${svc}.repository=${{ secrets.DOCKERHUB_USERNAME }}/boutique-app \
                --set images.${svc}.tag=${svc}-${SHORT_SHA}"
            done
          fi

          helm upgrade --install ${{ env.RELEASE_NAME }} ./helm-chart \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values ./helm-chart/values.yaml \
            --values ./helm-chart/values-aks.yaml \
            --values ./helm-chart/values-azure-redis.yaml \
            --set "cartDatabase.connectionString=${{ secrets.AZURE_REDIS_CONN_STRING }}" \
            $SET_FLAGS \
            --wait \
            --timeout 5m

      - name: Apply Ingress
        run: kubectl apply -f microservices-extra-kube-manifests/ingress-aks.yaml

      - name: Apply frontend HPA
        run: kubectl apply -f scaling/frontend-hpa.yaml -n ${{ env.NAMESPACE }}
