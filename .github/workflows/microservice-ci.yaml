name: Microservice CI

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/microservices-demo-${{ inputs.service }}:sha-${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve build context and Dockerfile path
        id: ctx
        run: |
          if [ -f "./src/${{ inputs.service }}/Dockerfile" ]; then
            echo "context=./src/${{ inputs.service }}" >> $GITHUB_OUTPUT
            echo "dockerfile=./src/${{ inputs.service }}/Dockerfile" >> $GITHUB_OUTPUT
          else
            DOCKERFILE=$(find "./src/${{ inputs.service }}" -name Dockerfile | head -1)
            echo "context=$(dirname $DOCKERFILE)" >> $GITHUB_OUTPUT
            echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        run: |
          docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -f ${{ steps.ctx.outputs.dockerfile }} \
            -t ${{ env.IMAGE }} \
            ${{ steps.ctx.outputs.context }}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          severity: HIGH,CRITICAL
          exit-code: 0
          vuln-type: os,library

      - name: Push image
        run: docker push ${{ env.IMAGE }}
